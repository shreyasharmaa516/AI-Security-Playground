version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: sentra-postgres
    environment:
      POSTGRES_USER: sentra
      POSTGRES_PASSWORD: sentra_password
      POSTGRES_DB: sentradb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sentra-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: